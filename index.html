<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Shop trendy Gen Z fashion for men & women. Affordable clothing, fast delivery across India.">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    
    <title>Cosmic World | Trendy Gen Z Clothing Store India</title>
    
    <link href="./assets/css2" rel="stylesheet">
    <link href="./assets/main.87517f9f.css" rel="stylesheet">

    <style>
        /* Fallback to ensure dark mode if CSS takes a second to load */
        body { background-color: #000000; color: #ffffff; margin: 0; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #8264ee, #ff81fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root">
        <div class="App">
            <header class="main-header">
                <div class="header-container">
                    <a class="logo" href="#">
                        <div class="logo-text">COSMIC WORLD</div>
                        <div class="logo-tagline">GEN Z FASHION</div>
                    </a>
                    <nav class="main-nav">
                        <a class="nav-link active" href="#">HOME</a>
                        <a class="nav-link" href="#">MEN'S</a>
                        <a class="nav-link" href="#">WOMEN'S</a>
                        <a class="nav-link" href="#">UNISEX</a>
                        <a class="nav-link" href="#">ABOUT</a>
                    </nav>
                </div>
            </header>

            <main class="main-content">
                <div class="home-page-dark">
                    <section class="hero-section-dark">
                        <div class="hero-content-dark">
                            <div class="hero-text-dark">
                                <div class="hero-badge">🔥 TRENDING NOW</div>
                                <h1 class="hero-title-dark">Own Your Vibe with <span class="gradient-text">Cosmic World</span></h1>
                                <p class="hero-tagline-dark">Trendy. Affordable. Made for Gen Z India.</p>
                                <div class="hero-ctas">
                                    <a class="btn-primary" href="#">SHOP NOW</a>
                                </div>
                            </div>
                            <div class="hero-image-dark">
                                <img alt="Fashion Hero" class="hero-main-image" src="./assets/photo-1542847957-80a6beffcbde">
                            </div>
                        </div>
                    </section>

                    <section class="stats-section-dark">
                        <div class="stats-container-dark">
                            <div class="stat-card-dark"><div class="stat-value-dark gradient-text">1000+</div><div class="stat-label-dark">Orders</div></div>
                            <div class="stat-card-dark"><div class="stat-value-dark gradient-text">500+</div><div class="stat-label-dark">Customers</div></div>
                            <div class="stat-card-dark"><div class="stat-value-dark gradient-text">4.8/5</div><div class="stat-label-dark">Rating</div></div>
                        </div>
                    </section>

                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title-dark">Shop By <span class="gradient-text">Collection</span></h2>
                        </div>
                        <div class="collections-grid">
                            <a class="collection-card" href="#">
                                <img alt="Men" src="./assets/photo-1542847957-80a6beffcbde">
                                <div class="collection-overlay"><h3>MEN'S WEAR</h3></div>
                            </a>
                            <a class="collection-card" href="#">
                                <img alt="Women" src="./assets/photo-1772130204516-2145cc1402b7">
                                <div class="collection-overlay"><h3>WOMEN'S WEAR</h3></div>
                            </a>
                        </div>
                    </section>
                </div>
            </main>

            <footer class="main-footer">
                <div class="footer-bottom">
                    <p>© 2026 Cosmic World. All rights reserved.</p>
                </div>
            </footer>
            
            <a href="https://wa.me/918801743145" class="whatsapp-float" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30" alt="WhatsApp">
            </a>
        </div>
